<section id="dashboard" class="dashboard">
  <div class="dash-header">
    <div class="dash-date" id="dash-date"></div>
    <div class="dash-time" id="dash-time"></div>
  </div>

  <div class="dash-row">
    <div class="dash-card dash-card-large">
      <h2>Today’s Shift</h2>
      <p id="today-shift-status">No shift set for today.</p>
      <p id="today-shift-time"></p>
      <p id="today-shift-hours"></p>
    </div>

    <div class="dash-card dash-card-large">
      <h2>Countdown</h2>
      <p id="countdown-label">Waiting for shift data…</p>
      <div class="countdown-timer" id="countdown-timer">--:--:--</div>
    </div>
  </div>

  <div class="dash-row">
    <div class="dash-card">
      <h3>Weekly Hours</h3>
      <p id="weekly-hours">0 hrs</p>
    </div>
    <div class="dash-card">
      <h3>Monthly Hours</h3>
      <p id="monthly-hours">0 hrs</p>
    </div>
    <div class="dash-card">
      <h3>Earnings</h3>
      <p id="earnings-total">$0.00</p>
    </div>
  </div>

  <div class="dash-row">
    <div class="dash-card dash-card-wide">
      <h3>Next Shift</h3>
      <p id="next-shift-info">No upcoming shifts.</p>
    </div>
  </div>

  <div class="dash-row">
    <div class="dash-card dash-card-notes">
      <h3>Quick Notes</h3>
      <textarea id="quick-notes" placeholder="Type notes here..."></textarea>
    </div>

    <div class="dash-card dash-card-actions">
      <h3>Quick Actions</h3>
      <button class="dash-btn" id="btn-add-shift">Add Shift</button>
      <button class="dash-btn" id="btn-view-calendar">View Calendar</button>
      <button class="dash-btn" id="btn-view-week">View Week</button>
      <button class="dash-btn" id="btn-view-tools">Tools</button>
    </div>
  </div>
</section>
